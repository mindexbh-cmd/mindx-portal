services:
  - type: web
    name: mindx-portal
    env: python
    buildCommand: pip install -r requirements.txt && python -c "from app import init_db; init_db()"
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
  

