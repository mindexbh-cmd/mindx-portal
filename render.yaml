services:
  - type: web
    name: mindx-portal
    env: python
    # Build pipeline:
    #   1. pip install -r requirements.txt
    #   2. playwright install chromium    → downloads the Chromium
    #      binary to PLAYWRIGHT_BROWSERS_PATH on the persistent disk
    #      so it survives subsequent deploys (cache hit on rebuild).
    #   3. playwright install-deps chromium → installs system libs
    #      (libnss3, libatk1.0-0, etc). Render's build environment is
    #      privileged enough for this; if it fails on a future image
    #      change the `|| true` keeps the deploy alive and the docs
    #      system falls back to manual upload.
    buildCommand: |
      pip install -r requirements.txt &&
      (pip install 'pillow-heif>=0.13' || echo "[deploy] pillow-heif install failed — HEIC parent uploads will fall back to passthrough") &&
      python -m playwright install chromium &&
      (python -m playwright install-deps chromium || echo "[deploy] install-deps non-fatal failure")
    # --timeout 300: was 120s for the Drive-import endpoint (pre-import
    #   backup + xlsx fetch + parse + per-row upsert can run 30-90s for
    #   ~280 rows against Postgres). Raised to 300s to accommodate
    #   150 MB book uploads — on a 3 Mbps mobile connection a single
    #   file upload takes ~6-7 min, well past the old ceiling.
    # --graceful-timeout 30: how long to give in-flight requests to
    #   finish during a deploy/restart before SIGKILL.
    # --workers 2 / --threads 4: conservative for the 512 MB RAM
    #   Starter plan. 2 worker processes × 4 threads = up to 8
    #   concurrent requests (gthread worker) while keeping per-worker
    #   memory low. Pre-fork lets idle workers be cheap.
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 300 --graceful-timeout 30 --workers 2 --threads 4
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DB_PATH
        value: /var/data/mindx.db
      # Cache Chromium on the persistent disk so it doesn't re-download
      # (~150 MB) on every deploy. Same disk as the SQLite DB.
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /var/data/playwright-browsers
      - key: PYTHONUNBUFFERED
        value: "1"
      # ── Web Push (VAPID) — Phase 2 (v3.1-push-foundation).
      # sync:false means Render does NOT carry these into a Blueprint
      # clone; the owner must paste them manually into the dashboard
      # for each environment. Generate the key pair locally via
      #   python scripts/generate_vapid.py
      # then add the printed values in Render → Environment.
      # If unset, /api/push/vapid-public-key returns an empty string
      # and the client-side prompt logic refuses to start the
      # subscribe flow — feature degrades gracefully until keys land.
      - key: VAPID_PUBLIC_KEY
        sync: false
      - key: VAPID_PRIVATE_KEY
        sync: false
      - key: VAPID_CLAIM_SUB
        value: "mailto:mindex.bh@gmail.com"
      # ── TWA / Android sideloaded APK (Phase 3 v3.3-twa-ready).
      # Set after the first PWABuilder.com build. The fingerprint
      # is the SHA-256 of the keystore certificate used to sign the
      # APK. Format: 32 hex bytes separated by colons, exactly 95
      # characters total ("AA:BB:CC:...:99"). Multiple fingerprints
      # can be comma-separated to support keystore rotation. With
      # the env var unset /.well-known/assetlinks.json returns []
      # which is a valid 'no verified app yet' response — the TWA
      # still installs, just falls back to Chrome-Custom-Tab UI
      # (URL bar visible) until the fingerprint lands.
      - key: TWA_SHA256_FINGERPRINT
        sync: false
      # Optional: override the default Android package_name
      # (com.mindex.portal). Only needed if the PWABuilder build
      # used a different package id.
      - key: TWA_PACKAGE_NAME
        sync: false
    disk:
      name: mindx-data
      mountPath: /var/data
      sizeGB: 1

# redeploy 2026-04-26T23:45:00Z (chromium build)
