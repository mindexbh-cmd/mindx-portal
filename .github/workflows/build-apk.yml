name: Build Mindex Android APK

# Triggers:
#   - workflow_dispatch  : manual button in the Actions tab
#   - push to main when  : only when something that actually affects
#     the PWA surface     the APK changed — avoids rebuilding the
#                         APK on every backend commit.
on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'twa-manifest.json'
      - 'static/icons/**'
      - '.github/workflows/build-apk.yml'

jobs:
  build:
    name: Build TWA APK
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fail fast if signing secrets are missing
        env:
          KS:    ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          KSP:   ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KP:    ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          missing=()
          if [ -z "$KS"    ]; then missing+=("ANDROID_KEYSTORE_BASE64"); fi
          if [ -z "$KSP"   ]; then missing+=("ANDROID_KEYSTORE_PASSWORD"); fi
          if [ -z "$ALIAS" ]; then missing+=("ANDROID_KEY_ALIAS"); fi
          if [ -z "$KP"    ]; then missing+=("ANDROID_KEY_PASSWORD"); fi
          if [ ${#missing[@]} -ne 0 ]; then
            echo "::error::Missing required GitHub Actions secrets: ${missing[*]}"
            echo ""
            echo "Generate a keystore once locally and add the 4 secrets — see docs/APK_BUILD.md."
            exit 1
          fi
          echo "All four signing secrets present."

      - name: Set up JDK 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Bubblewrap pulls in build-tools 33+ automatically when it
          # initialises; declaring nothing here lets the action install
          # only the always-required cmdline-tools + platform-tools.
          packages: ''

      - name: Install Bubblewrap CLI (pinned)
        # Version-bisecting the "Invalid URL" error:
        #   1.24.1 (@latest)        fail
        #   1.20.0                  fail
        #   1.19.0                  doesn't exist on npm
        #
        # npm registry confirms these stable versions exist:
        #   1.18.0/.1, 1.19.1, 1.20.0/.1, 1.21.0,
        #   1.22.0/.2/.3/.4/.5/.6/.7, 1.23.0, 1.24.0/.1
        #
        # Trying 1.23.0 next — one minor below latest. Lets us
        # narrow whether the regression is recent (1.24.x) or
        # spans more versions.
        run: npm install -g @bubblewrap/cli@1.23.0

      - name: Decode keystore from secret
        env:
          KS: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          # Re-decode here rather than reusing one from disk — keeps
          # the keystore ephemeral to this run.
          echo "$KS" | base64 -d > "$GITHUB_WORKSPACE/android.keystore"
          test -s "$GITHUB_WORKSPACE/android.keystore" \
            && echo "Keystore decoded ($(wc -c < "$GITHUB_WORKSPACE/android.keystore") bytes)"

      - name: Pre-create Bubblewrap config file
        run: |
          # The DOCUMENTED way to skip Bubblewrap's interactive
          # "install JDK?" + "install Android SDK?" prompts is to
          # pre-write its persistent config file at
          # ~/.bubblewrap/config.json. When init starts it reads
          # the paths from there and asks nothing.
          # Ref: github.com/GoogleChromeLabs/bubblewrap/blob/main
          #      /packages/cli/README.md#configuration
          # Both prior attempts (updateConfig + --jdkPath flag)
          # turned out to not actually suppress prompts on the
          # @bubblewrap/cli@latest version installed in CI.
          export ANDROID_HOME="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=$ANDROID_HOME"
          mkdir -p "$HOME/.bubblewrap"
          cat > "$HOME/.bubblewrap/config.json" <<EOF
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_HOME"
          }
          EOF
          echo "--- ~/.bubblewrap/config.json ---"
          cat "$HOME/.bubblewrap/config.json"

      - name: Diagnostic dump (versions, env, manifests, reachability)
        run: |
          echo "=== Tool versions ==="
          node --version
          npm --version
          which bubblewrap
          bubblewrap --version || true
          npm list -g @bubblewrap/cli 2>/dev/null | head -5
          echo ""
          echo "=== Environment ==="
          echo "JAVA_HOME=$JAVA_HOME"
          echo "ANDROID_HOME=${ANDROID_HOME:-(unset)}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT:-(unset)}"
          test -d "$JAVA_HOME" && echo "  JAVA_HOME exists" || echo "  JAVA_HOME MISSING"
          test -d "${ANDROID_HOME:-/nope}" && echo "  ANDROID_HOME exists" || echo "  ANDROID_HOME MISSING"
          echo ""
          echo "=== ~/.bubblewrap/config.json ==="
          cat "$HOME/.bubblewrap/config.json" 2>/dev/null || echo "(file missing)"
          echo ""
          echo "=== Raw bytes of twa-manifest.json (first 50 lines of xxd) ==="
          # Reveals any non-ASCII / zero-width / BOM / underscore
          # characters that GitHub Actions' log Markdown rendering
          # might be silently inserting or hiding.
          xxd twa-manifest.json | head -50
          echo ""
          echo "=== Node URL.parse() on every twa-manifest.json URL field ==="
          node <<'NODE_TEST_1'
          const fs = require('fs');
          const m = JSON.parse(fs.readFileSync('twa-manifest.json', 'utf8'));
          console.log('Parsed twa-manifest.json (pretty):');
          console.log(JSON.stringify(m, null, 2));
          console.log('---');
          console.log('Testing each URL field with new URL():');
          ['startUrl', 'iconUrl', 'maskableIconUrl',
           'monochromeIconUrl', 'webManifestUrl', 'fullScopeUrl']
          .forEach(k => {
            const v = m[k];
            try {
              const u = new URL(v);
              console.log('  OK  ', k, '=', v, '-> origin', u.origin);
            } catch (e) {
              console.log('  FAIL', k, '=', JSON.stringify(v), '->', e.message);
            }
          });
          console.log('---');
          console.log('Testing host treated as URL (with https:// prefix):');
          try {
            const u = new URL('https://' + m.host);
            console.log('  OK   host as URL =', u.href);
          } catch (e) {
            console.log('  FAIL host:', e.message);
          }
          NODE_TEST_1
          echo ""
          echo "=== Node URL.parse() on every LIVE /manifest.json URL field ==="
          curl -s https://mindx-portal-1.onrender.com/manifest.json \
            | node <<'NODE_TEST_2'
          let body = '';
          process.stdin.on('data', c => body += c);
          process.stdin.on('end', () => {
            const m = JSON.parse(body);
            console.log('Live manifest URLs:');
            console.log('  start_url:', JSON.stringify(m.start_url));
            console.log('  scope    :', JSON.stringify(m.scope));
            (m.icons || []).forEach((i, idx) =>
              console.log('  icon[' + idx + '].src:', JSON.stringify(i.src)));
            console.log('Testing with new URL():');
            try { new URL(m.start_url); console.log('  start_url OK'); }
            catch (e) { console.log('  start_url FAIL:', e.message); }
            try { new URL(m.scope); console.log('  scope OK'); }
            catch (e) { console.log('  scope FAIL:', e.message); }
            (m.icons || []).forEach((i, idx) => {
              try { new URL(i.src); console.log('  icon[' + idx + '] OK'); }
              catch (e) { console.log('  icon[' + idx + '] FAIL:', e.message); }
            });
          });
          NODE_TEST_2
          echo ""
          echo "=== Live /manifest.json reachability headers ==="
          curl -sI https://mindx-portal-1.onrender.com/manifest.json 2>&1 | head -10
          echo ""

      - name: Scaffold Android project from twa-manifest.json
        env:
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
          # Surface 'Invalid URL' details and any other CLI errors
          # to the workflow log. Set DEBUG=* to maximise verbosity
          # — most Bubblewrap modules use the 'debug' package and
          # respect this.
          DEBUG: "*"
          BUBBLEWRAP_LOG_LEVEL: "debug"
        run: |
          mkdir -p "$RUNNER_TEMP/twa-build"
          cp twa-manifest.json "$RUNNER_TEMP/twa-build/twa-manifest.json"
          cp "$GITHUB_WORKSPACE/android.keystore" \
             "$RUNNER_TEMP/twa-build/android.keystore"
          cd "$RUNNER_TEMP/twa-build"
          # --manifest is REQUIRED by Bubblewrap CLI (init errors
          # with "Missing required parameter --manifest" without
          # it). Pass an absolute path to the committed
          # twa-manifest.json from the repo checkout — relative
          # paths trip the CLI's `new URL(arg)` validator. The
          # v4 commit absolutized the live /manifest.json URLs,
          # so the "Invalid URL" we hit earlier should now be gone
          # regardless of which file Bubblewrap parses.
          yes "No" 2>/dev/null | head -20 \
            | bubblewrap init \
                --manifest="$GITHUB_WORKSPACE/twa-manifest.json" \
                --directory "$RUNNER_TEMP/twa-build" \
                --skipPwaValidation

      - name: Build signed release APK
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_PASSWORD:      ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
          GRADLE_OPTS: "-Dorg.gradle.daemon=false"
        run: |
          cd "$RUNNER_TEMP/twa-build"
          # First two lines for the keystore + key password prompts
          # (Bubblewrap's documented signing pass). Trailing 'No's
          # cover any unexpected install prompts from new flags.
          {
            printf '%s\n%s\n' "$ANDROID_KEYSTORE_PASSWORD" "$ANDROID_KEY_PASSWORD"
            yes "No" 2>/dev/null | head -10
          } | bubblewrap build \
                --skipPwaValidation
          ls -lh ./app-release-signed.apk

      - name: Extract SHA-256 signing fingerprint
        id: fingerprint
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS:         ${{ secrets.ANDROID_KEY_ALIAS }}
        run: |
          cd "$RUNNER_TEMP/twa-build"
          fp=$(keytool -list -v -keystore ./android.keystore \
               -alias "$ANDROID_KEY_ALIAS" \
               -storepass "$ANDROID_KEYSTORE_PASSWORD" 2>/dev/null \
               | grep -i "SHA256:" \
               | head -1 \
               | sed 's/.*SHA256: //' \
               | tr -d ' \r\n')
          if [ -z "$fp" ]; then
            echo "::error::Could not extract SHA-256 fingerprint from keystore"
            exit 1
          fi
          echo "fingerprint=$fp" >> "$GITHUB_OUTPUT"
          {
            echo "## Mindex APK build complete"
            echo ""
            echo "**SHA-256 signing fingerprint:**"
            echo ""
            echo '```'
            echo "$fp"
            echo '```'
            echo ""
            echo "**Next step:** paste this value into Render →"
            echo "mindx-portal service → Environment →"
            echo "\`TWA_SHA256_FINGERPRINT\` → Save changes."
            echo ""
            echo "The APK is available below as a workflow artifact."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload signed APK
        uses: actions/upload-artifact@v4
        with:
          name: mindex-apk-${{ github.run_number }}
          path: ${{ runner.temp }}/twa-build/app-release-signed.apk
          if-no-files-found: error
          retention-days: 30

      - name: Upload twa-manifest.json (post-init) for reproducibility
        uses: actions/upload-artifact@v4
        with:
          name: twa-manifest-${{ github.run_number }}
          path: ${{ runner.temp }}/twa-build/twa-manifest.json
          retention-days: 30
          if-no-files-found: warn
